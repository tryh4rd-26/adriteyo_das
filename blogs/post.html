<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tryhard // blog reader</title>
    <link rel="icon" type="image/jpeg" href="/assets/img/razorbill.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #0c0a15;
            --text-main: #f1f5f9;
            --text-muted: #88888e;
            --accent-green: #10b981;
            --accent-purple: #f43f5e;
            --accent-blue: #06b6d4;
            --accent-yellow: #fbbf24;
            --border-color: #2b2b2f;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            padding: 3rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        /* Pure Monochrome Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999;
            background-size: 100% 3px;
            pointer-events: none;
            opacity: 0.4;
        }

        .header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .header .path {
            color: var(--accent-green);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
        }

        .header .cmd {
            color: var(--accent-purple);
            font-weight: bold;
            font-size: 1rem;
        }

        .post-content {
            margin-top: 2rem;
        }

        /* Markdown rendered content styling */
        .post-content h1 {
            color: var(--accent-yellow);
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
        }

        .post-content h2 {
            color: var(--accent-blue);
            font-size: 1.4rem;
            margin-top: 1.8rem;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 5px rgba(6, 182, 212, 0.2);
        }

        .post-content h3 {
            color: var(--accent-green);
            font-size: 1.15rem;
            margin-top: 1.5rem;
            margin-bottom: 0.6rem;
        }

        .post-content p {
            margin-bottom: 1.2rem;
            color: var(--text-main);
            text-align: justify;
        }

        .post-content a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-blue);
        }

        .post-content a:hover {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }

        .post-content ul, .post-content ol {
            margin-bottom: 1.2rem;
            padding-left: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.4rem;
        }

        .post-content pre {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .post-content code {
            font-family: var(--font-mono);
            font-size: 13px;
            background-color: #1a1a24;
            padding: 0.1rem 0.3rem;
            color: var(--accent-yellow);
        }

        .post-content pre code {
            background-color: transparent;
            padding: 0;
            color: var(--text-main);
            display: block;
        }

        .post-content blockquote {
            border-left: 3px solid var(--accent-green);
            padding-left: 1rem;
            margin-bottom: 1.2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-color);
            margin: 1.5rem 0;
        }

        .back-links {
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .back-links a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: bold;
        }

        .back-links a:hover {
            color: var(--accent-blue);
        }

        .error-message {
            color: var(--accent-purple);
            border: 1px dashed var(--accent-purple);
            padding: 1.5rem;
            margin-top: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 id="post-header-title" style="color: var(--accent-green); margin-bottom: 0.5rem; font-size: 1.8rem; letter-spacing: 1px;">/blogs/blog_src</h1>
    </header>

    <main>
        <div id="loading" style="color: var(--accent-yellow);">[ LOADING BLOG DATA... ]</div>
        <article class="post-content" id="post-content" style="display: none;"></article>
        <div class="error-message" id="error-container" style="display: none;"></div>
    </main>

    <footer class="back-links">
        <a href="index.html">&lt;-- Return to Blogs</a>
        <a href="../">Return to Portfolio</a>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Get post source file from URL params
            const params = new URLSearchParams(window.location.search);
            const src = params.get('src');
            
            const headerTitle = document.getElementById('post-header-title');
            const contentElem = document.getElementById('post-content');
            const loadingElem = document.getElementById('loading');
            const errorElem = document.getElementById('error-container');

            if (!src) {
                showError("No source file specified in URL query. Usage: post.html?src=filename.md");
                return;
            }

            // Sanitize query to avoid directory traversal out of blog_src
            const cleanSrc = src.replace(/^.*[\\\/]/, '');
            const targetPath = "/blogs/blog_src/" + cleanSrc;

            if (headerTitle) {
                headerTitle.textContent = `/blogs/blog_src/${cleanSrc}`;
            }

            // Fetch markdown content from the blog_src directory
            fetch(targetPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Could not find specified blog: ${cleanSrc} (HTTP status ${response.status})`);
                    }
                    return response.text();
                })
                .then(markdownText => {
                    // Render using Marked
                    const htmlContent = marked.parse(markdownText);
                    contentElem.innerHTML = htmlContent;
                    
                    // Hide loading indicator, show content
                    loadingElem.style.display = 'none';
                    contentElem.style.display = 'block';

                    // Update document title dynamically based on first H1 or filename
                    const h1 = contentElem.querySelector('h1');
                    if (h1) {
                        document.title = `tryhard // ${h1.textContent}`;
                    } else {
                        document.title = `tryhard // ${cleanSrc.replace('.md', '')}`;
                    }
                })
                .catch(err => {
                    showError(err.message);
                });

            function showError(msg) {
                loadingElem.style.display = 'none';
                errorElem.textContent = `[ ERROR: ${msg} ]`;
                errorElem.style.display = 'block';
            }
        });
    </script>
</body>
</html>
